<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion Voice — Encrypted Voice Analysis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 24px 40px;
            border-bottom: 1px solid #2a2a4a;
        }
        .header h1 { font-size: 24px; color: #7b68ee; }
        .header p { color: #888; margin-top: 4px; font-size: 14px; }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background: #12121a;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 24px;
        }
        .card h2 { color: #7b68ee; margin-bottom: 16px; font-size: 18px; }
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .task-btn {
            background: #1a1a2e;
            border: 2px solid #2a2a4a;
            border-radius: 8px;
            padding: 14px;
            color: #ccc;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .task-btn:hover { border-color: #7b68ee; color: #fff; }
        .task-btn.active { border-color: #7b68ee; background: #1e1e3a; color: #7b68ee; }
        .task-btn .icon { font-size: 24px; display: block; margin-bottom: 6px; }
        .task-btn .name { font-size: 13px; font-weight: 600; }
        .upload-area {
            border: 2px dashed #2a2a4a;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .upload-area:hover { border-color: #7b68ee; }
        .upload-area.has-file { border-color: #4caf50; border-style: solid; }
        .upload-area input[type="file"] { display: none; }
        .upload-area p { color: #888; font-size: 14px; }
        .upload-area .filename { color: #4caf50; font-weight: 600; }
        .btn {
            background: #7b68ee;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        .btn:hover { background: #6c5ce7; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        .result {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 20px;
            margin-top: 16px;
            display: none;
        }
        .result.show { display: block; }
        .result .prediction {
            font-size: 28px;
            font-weight: 700;
            color: #7b68ee;
            margin-bottom: 12px;
        }
        .result .detail { color: #888; font-size: 13px; margin: 4px 0; }
        .prob-bar {
            display: flex;
            align-items: center;
            margin: 6px 0;
        }
        .prob-bar .label { width: 120px; font-size: 13px; color: #aaa; }
        .prob-bar .bar-bg {
            flex: 1;
            height: 20px;
            background: #1e1e2e;
            border-radius: 4px;
            overflow: hidden;
        }
        .prob-bar .bar-fill {
            height: 100%;
            background: #7b68ee;
            border-radius: 4px;
            transition: width 0.5s;
        }
        .prob-bar .pct { width: 50px; text-align: right; font-size: 13px; color: #aaa; }
        .spinner {
            display: none;
            text-align: center;
            padding: 20px;
            color: #7b68ee;
        }
        .spinner.show { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner::before {
            content: '';
            display: inline-block;
            width: 30px; height: 30px;
            border: 3px solid #2a2a4a;
            border-top-color: #7b68ee;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }
        .dual-upload { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .badge {
            display: inline-block;
            background: #2a2a4a;
            color: #7b68ee;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Orion Voice</h1>
        <p>Encrypted voice analysis using Fully Homomorphic Encryption</p>
    </div>

    <div class="container">
        <div class="card">
            <h2>Select Task</h2>
            <div class="task-grid">
                <div class="task-btn active" data-task="verify" data-inputs="2">
                    <span class="icon">&#128101;</span>
                    <span class="name">Speaker Verify</span>
                </div>
                <div class="task-btn" data-task="speaker_id" data-inputs="1">
                    <span class="icon">&#128100;</span>
                    <span class="name">Speaker ID</span>
                </div>
                <div class="task-btn" data-task="gender" data-inputs="1">
                    <span class="icon">&#9892;</span>
                    <span class="name">Gender</span>
                </div>
                <div class="task-btn" data-task="emotion" data-inputs="1">
                    <span class="icon">&#127917;</span>
                    <span class="name">Emotion</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Upload Audio <span class="badge">WAV / FLAC</span></h2>
            <div id="upload-single" style="display:none;">
                <div class="upload-area" id="drop-single" onclick="document.getElementById('file-single').click()">
                    <input type="file" id="file-single" accept="audio/*">
                    <p>Click or drag audio file here</p>
                </div>
            </div>
            <div id="upload-dual">
                <div class="dual-upload">
                    <div class="upload-area" id="drop-a" onclick="document.getElementById('file-a').click()">
                        <input type="file" id="file-a" accept="audio/*">
                        <p>Audio A</p>
                    </div>
                    <div class="upload-area" id="drop-b" onclick="document.getElementById('file-b').click()">
                        <input type="file" id="file-b" accept="audio/*">
                        <p>Audio B</p>
                    </div>
                </div>
            </div>
            <br>
            <button class="btn" id="run-btn" onclick="runInference()">Analyze</button>
        </div>

        <div class="spinner" id="spinner">
            <br><p>Extracting features and running inference...</p>
        </div>

        <div class="card result" id="result">
            <h2>Result</h2>
            <div class="prediction" id="prediction"></div>
            <div id="probabilities"></div>
            <div class="detail" id="timing"></div>
        </div>
    </div>

    <script>
        let currentTask = 'verify';

        document.querySelectorAll('.task-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.task-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTask = btn.dataset.task;
                const inputs = parseInt(btn.dataset.inputs);
                document.getElementById('upload-single').style.display = inputs === 1 ? 'block' : 'none';
                document.getElementById('upload-dual').style.display = inputs === 2 ? 'block' : 'none';
                document.getElementById('result').classList.remove('show');
            });
        });

        function setupFileInput(inputId, dropId) {
            const input = document.getElementById(inputId);
            const drop = document.getElementById(dropId);
            input.addEventListener('change', () => {
                if (input.files.length > 0) {
                    drop.classList.add('has-file');
                    drop.querySelector('p').innerHTML = '<span class="filename">' + input.files[0].name + '</span>';
                }
            });
        }
        setupFileInput('file-a', 'drop-a');
        setupFileInput('file-b', 'drop-b');
        setupFileInput('file-single', 'drop-single');

        async function runInference() {
            const formData = new FormData();
            formData.append('task', currentTask);

            if (currentTask === 'verify') {
                const fileA = document.getElementById('file-a').files[0];
                const fileB = document.getElementById('file-b').files[0];
                if (!fileA || !fileB) { alert('Please select two audio files'); return; }
                formData.append('audio_a', fileA);
                formData.append('audio_b', fileB);
            } else {
                const file = document.getElementById('file-single').files[0];
                if (!file) { alert('Please select an audio file'); return; }
                formData.append('audio', file);
            }

            document.getElementById('run-btn').disabled = true;
            document.getElementById('spinner').classList.add('show');
            document.getElementById('result').classList.remove('show');

            try {
                const resp = await fetch('/api/predict', { method: 'POST', body: formData });
                const data = await resp.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                document.getElementById('prediction').textContent = data.prediction;

                let probHtml = '';
                const probs = data.probabilities;
                const sorted = Object.entries(probs).sort((a, b) => b[1] - a[1]);
                for (const [label, prob] of sorted) {
                    const pct = (prob * 100).toFixed(1);
                    probHtml += `<div class="prob-bar">
                        <span class="label">${label}</span>
                        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
                        <span class="pct">${pct}%</span>
                    </div>`;
                }
                document.getElementById('probabilities').innerHTML = probHtml;
                document.getElementById('timing').textContent =
                    `Feature extraction: ${(data.feature_time * 1000).toFixed(0)}ms | Inference: ${(data.inference_time * 1000).toFixed(0)}ms`;
                document.getElementById('result').classList.add('show');
            } catch (e) {
                alert('Error: ' + e.message);
            } finally {
                document.getElementById('run-btn').disabled = false;
                document.getElementById('spinner').classList.remove('show');
            }
        }
    </script>
</body>
</html>
